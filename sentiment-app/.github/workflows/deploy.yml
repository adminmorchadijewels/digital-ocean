# .github/workflows/deploy.yml
# CI/CD: lint → test → deploy to DigitalOcean App Platform on push to main
#
# Required GitHub Secrets:
#   DIGITALOCEAN_ACCESS_TOKEN  — your DO API token
#   DO_APP_ID                  — the App Platform app ID (from `doctl apps list`)

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & basic checks ─────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Check backend syntax
        run: python -m py_compile backend/main.py backend/model.py

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --frozen-lockfile
        working-directory: frontend

      - name: Build frontend (smoke test)
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://placeholder  # Build-time only

  # ── Deploy to App Platform (main branch only) ───────────────────────────────
  deploy:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update App Platform spec
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} --spec .do/app.yaml
          echo "Deploy triggered. Check progress with: doctl apps list-deployments ${{ secrets.DO_APP_ID }}"
