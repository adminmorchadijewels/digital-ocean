version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Backend: FastAPI + VADER ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Comma-separated list of allowed CORS origins
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      LOG_LEVEL: "info"
    env_file:
      - ./backend/.env          # optional local overrides (git-ignored)
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend: React + Nginx ─────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser must reach the API, so use the host-mapped port
        VITE_API_URL: "http://localhost:8000"
    container_name: sentiment-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
