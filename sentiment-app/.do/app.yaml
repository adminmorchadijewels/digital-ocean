# DigitalOcean App Platform specification
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Deploy with:
#   doctl apps create --spec .do/app.yaml
# Update with:
#   doctl apps update <app-id> --spec .do/app.yaml

name: sentiment-analyzer
region: nyc  # Closest to your users: nyc | sfo | ams | sgp | lon | fra | blr | syd

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  # ── Backend API (Python/Docker) ─────────────────────────────────────────────
  - name: api
    dockerfile_path: backend/Dockerfile
    source_dir: /
    github:
      # Replace with your actual GitHub repo and branch
      repo: YOUR_GITHUB_USERNAME/sentiment-app
      branch: main
      deploy_on_push: true

    # HTTP settings
    http_port: 8000
    routes:
      - path: /

    # Resource sizing — basic-xxs: 1 vCPU, 512 MB RAM (~$5/mo)
    instance_size_slug: basic-xxs
    instance_count: 1

    # Health check
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3
      success_threshold: 1

    # Environment variables
    envs:
      - key: ALLOWED_ORIGINS
        # On App Platform, the web service URL is injected automatically.
        # Use a wildcard during initial deploy; tighten after you know the URL.
        value: "*"
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: info
        scope: RUN_TIME

  # ── Frontend (Static Site via Nginx) ────────────────────────────────────────
  - name: web
    dockerfile_path: frontend/Dockerfile
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/sentiment-app
      branch: main
      deploy_on_push: true

    http_port: 80
    routes:
      - path: /

    instance_size_slug: basic-xxs
    instance_count: 1

    # Build args — tell Vite where the API lives.
    # ${api.PUBLIC_URL} is resolved by App Platform to the api service's URL.
    build_command: ""   # Dockerfile handles the build
    envs:
      - key: VITE_API_URL
        # Reference the api service's public URL at build time
        value: ${api.PUBLIC_URL}
        scope: BUILD_TIME
